<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CaloriTrack"/>
<meta name="theme-color" content="#f5f5f7"/>
<meta name="description" content="Personal calorie and nutrition tracker"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-startup-image" media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3)" href="/splash-1170x2532.png"/>
<link rel="apple-touch-startup-image" media="(device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3)" href="/splash-1179x2556.png"/>
<link rel="apple-touch-startup-image" media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)" href="/splash-1290x2796.png"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<title>CaloriTrack</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --sur:#ffffff;
  --card:#ffffff;
  --card2:#f5f5f7;
  --bor:#e5e5ea;
  --bor2:#d1d1d6;
  --acc:#007aff;
  --acc-light:#e8f1ff;
  --acc2:#34c759;
  --acc2-light:#e8f8ed;
  --red:#ff3b30;
  --red-light:#fff0ef;
  --ora:#ff9500;
  --ora-light:#fff4e5;
  --pur:#af52de;
  --txt:#1c1c1e;
  --txt2:#3c3c43;
  --mut:#8e8e93;
  --mut2:#aeaeb2;
  --r:12px;
  --r2:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(0,0,0,.08);
}
html{overflow-x:hidden;overflow-y:scroll;background:var(--bg)}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior-x:none;overflow-x:hidden;width:100%;position:relative;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;overflow-x:hidden;width:100%}

/* ── Header ── */
.hdr{padding-top:calc(env(safe-area-inset-top) + 10px);padding-bottom:10px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--txt);letter-spacing:-.3px;flex-shrink:0}
.logo span{color:var(--acc)}

/* ── Nav tabs ── */
.nav{display:flex;gap:2px;background:var(--card2);padding:3px;border-radius:10px;border:1px solid var(--bor);overflow-x:auto;flex:1;max-width:680px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:6px 12px;border:none;background:transparent;color:var(--mut);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .18s;white-space:nowrap;-webkit-touch-callout:none;user-select:none}
.nb.on{background:var(--sur);color:var(--txt);font-weight:600;box-shadow:var(--shadow)}
.nb:active{opacity:.7}
@media(max-width:400px){.nb{padding:5px 8px;font-size:11px}}

/* ── Layout ── */
.pg{flex:1;padding:20px 16px;padding-bottom:max(80px,env(safe-area-inset-bottom));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));max-width:960px;margin:0 auto;width:100%;overflow-x:hidden;box-sizing:border-box}
.h1{font-size:28px;font-weight:700;color:var(--txt);margin-bottom:4px;letter-spacing:-.5px}
.sub{color:var(--mut);font-size:13px;margin-bottom:20px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0}
@media(max-width:600px){.g2{grid-template-columns:1fr}}

/* ── Cards ── */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:18px 16px;margin-bottom:12px;overflow:hidden;min-width:0;box-shadow:var(--shadow)}
.ct{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:12px;font-weight:600}

/* ── Buttons ── */
.btn{padding:10px 18px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;-webkit-touch-callout:none;user-select:none;touch-action:manipulation}
.btn:active{transform:scale(0.97);opacity:.85}
.bp{background:var(--acc);color:#fff}.bp:hover{background:#0066dd}
.bs{background:var(--card2);color:var(--txt2);border:1px solid var(--bor)}.bs:hover{background:#e5e5ea}
.br{background:var(--red-light);color:var(--red);border:1px solid rgba(255,59,48,.15)}
.bg2{background:var(--acc2);color:#fff}.bg2:hover{background:#2db350}
.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Inputs ── */
.inp{width:100%;background:var(--card2);border:1.5px solid var(--bor);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:'Inter',sans-serif;font-size:16px;outline:none;transition:border-color .18s,-webkit-appearance .18s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--acc);background:var(--sur)}
.inp::placeholder{color:var(--mut2)}
.ig{display:flex;gap:6px;margin-bottom:10px;flex-wrap:nowrap;min-width:0;width:100%}.ig .inp{flex:1;min-width:0;width:0}
select.inp{cursor:pointer;font-size:16px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;display:block;border-radius:10px;border:1px solid var(--bor)}
.tbl{border-collapse:collapse;width:100%;min-width:520px}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);padding:10px 12px;border-bottom:1px solid var(--bor);font-weight:600;background:var(--card2)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bor);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f9f9fb}

/* ── Badges ── */
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bgg{background:var(--acc-light);color:var(--acc)}
.bgb{background:var(--acc2-light);color:var(--acc2)}
.bgo{background:var(--ora-light);color:var(--ora)}
.bgp{background:#f3e8ff;color:var(--pur)}
.bgr{background:var(--red-light);color:var(--red)}

/* ── Macro pills ── */
.mrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;width:100%}
.mpill{flex:1;min-width:64px;background:var(--card2);border:1px solid var(--bor);border-radius:10px;padding:10px 6px;text-align:center;box-sizing:border-box}
.mpv{font-size:16px;color:var(--acc);font-weight:700}
.mpl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-top:2px;font-weight:500}

/* ── Hero ── */
.hero{text-align:center;padding:24px 16px;background:linear-gradient(135deg,var(--acc-light),rgba(52,199,89,.08));border-radius:var(--r2);border:1px solid rgba(0,122,255,.12);margin-bottom:16px;width:100%;box-sizing:border-box}
.hv{font-size:clamp(40px,12vw,58px);font-weight:700;color:var(--acc);line-height:1;letter-spacing:-2px}
.hl{color:var(--mut);font-size:12px;margin-top:5px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.srow{display:flex;align-items:center;gap:10px;margin-top:16px;width:100%;min-width:0}
.srow label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:500}
.srow input[type=range]{flex:1;accent-color:var(--acc)}
.srow .val{color:var(--acc);font-size:14px;font-weight:700;min-width:36px;text-align:right}

/* ── Misc ── */
.ld{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:13px;padding:10px 0}
.spin{width:18px;height:18px;border:2.5px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:13px;line-height:1.9}
.empty-icon{font-size:40px;margin-bottom:12px}
.cambox{width:100%;aspect-ratio:4/3;max-height:260px;background:var(--card2);border:2px dashed var(--bor2);border-radius:var(--r2);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;box-sizing:border-box}
.cambox.drag{border-color:var(--acc);background:var(--acc-light)}
.cambox video,.cambox img{width:100%;height:100%;object-fit:cover;display:block}
.camhint{color:var(--mut);font-size:13px;text-align:center;line-height:1.8;pointer-events:none;padding:20px}
.rir{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--bor);flex-wrap:wrap;min-width:0}
.rir:last-child{border-bottom:none}

/* ── Recipe cards ── */
.rec-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .18s;min-width:0;overflow:hidden;box-shadow:var(--shadow)}
.rec-card:hover{border-color:var(--acc);box-shadow:var(--shadow2)}
.rec-card:active{transform:scale(0.99)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;width:100%}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}}
.stat{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:16px;min-width:0;box-shadow:var(--shadow)}
.stat-val{font-size:28px;font-weight:700;color:var(--acc);line-height:1;letter-spacing:-.5px}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-top:4px;font-weight:500}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;animation:su .3s ease;max-width:320px;line-height:1.4;box-shadow:0 8px 30px rgba(0,0,0,.15);text-align:center;white-space:nowrap}
.ts{background:var(--txt);color:#fff}
.te{background:var(--red);color:#fff}
.ti{background:var(--acc2);color:#fff}
@keyframes su{from{transform:translateX(-50%) translateY(16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal{background:var(--sur);border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:20px;padding:28px}}
.modal-handle{width:36px;height:4px;background:var(--bor2);border-radius:2px;margin:0 auto 20px}

/* ── Errbox ── */
.errbox{padding:12px 14px;background:var(--red-light);border:1px solid rgba(255,59,48,.2);border-radius:10px;font-size:12px;color:var(--red);line-height:1.7;margin-top:10px}

/* ── Daily diet progress bar ── */
.progress-wrap{background:var(--card2);border-radius:20px;height:10px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;border-radius:20px;transition:width .4s ease;background:var(--acc2)}
.progress-bar.warn{background:var(--ora)}
.progress-bar.over{background:var(--red)}

/* ── Diet items ── */
.diet-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bor);min-width:0}
.diet-item:last-child{border-bottom:none}
.diet-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.diet-info{flex:1;min-width:0}
.diet-name{font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.diet-meta{font-size:11px;color:var(--mut);margin-top:1px}
.diet-cal{font-size:14px;font-weight:700;color:var(--acc);flex-shrink:0}

/* ── Day pill selector ── */
.day-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0;margin-bottom:16px}
.day-tabs::-webkit-scrollbar{display:none}
.day-pill{padding:8px 14px;border-radius:20px;border:1.5px solid var(--bor);background:var(--sur);font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.day-pill.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.day-pill:active{transform:scale(0.96)}

/* ── Section dividers ── */
.sdiv{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin:16px 0 8px;padding:0 2px}

/* ── Media ── */
@media(max-width:640px){
  .hdr{flex-wrap:wrap;gap:8px}
  .nav{max-width:100%;order:2;flex:0 0 100%}
  .logo{flex-shrink:0}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="logo">Calori<span>Track</span></div>
    <nav class="nav" id="nav"></nav>
  </header>
  <main class="pg" id="page"></main>
</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="modal" style="display:none"></div>

<script>
// ── Storage ───────────────────────────────────────────────────────────────────
let DB = {ingredients:[], rawIngredients:[], recipes:[], dailyDiet:{}, calorieTarget:2000, profiles:[], activeProfile:null};
let _saveTimer = null;

async function loadDB(){
  try{ const r=await fetch("/api/data"); if(r.ok) DB={...DB,...await r.json()}; }
  catch(e){ console.warn("Could not load data:", e); }
}
function saveDB(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async()=>{
    try{ await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DB)}); }
    catch(e){ console.warn("Could not save:", e); }
  }, 400);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type="s"){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=`toast t${type}`; el.style.display="block";
  clearTimeout(_tt); _tt=setTimeout(()=>el.style.display="none",3500);
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(messages,system=""){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages};
  if(system) body.system=system;
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  if(!r.ok||d.error) throw new Error(d.error||"API error "+r.status);
  return d.content?.map(b=>b.text||"").join("")||"";
}

async function scanLabel(dataUrl){
  const parts=dataUrl.split(",");
  const mimeMatch=parts[0].match(/data:(image\/[^;]+)/);
  const mime=mimeMatch?mimeMatch[1]:"image/jpeg";
  const b64=parts[1];
  const safeMime=["image/jpeg","image/png","image/gif","image/webp"].includes(mime)?mime:"image/jpeg";
  const sys=`You are a nutrition label reader. Return ONLY a raw JSON object, no markdown:\n{"productName":string,"servingSize":string,"caloriesPerServing":number,"protein":number,"carbs":number,"fat":number,"fiber":number|null,"ingredients":string}`;
  const t=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:safeMime,data:b64}},{type:"text",text:"Extract nutrition info as JSON."}]}],sys);
  try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return null;}
}

async function lookupCalories(items){
  const sys=`Return ONLY a raw JSON array, no markdown:\n[{"name":string,"quantity":number,"unit":string,"caloriesTotal":number,"proteinTotal":number,"carbsTotal":number,"fatTotal":number,"fiberTotal":number}]\nUse USDA values. Always include fiberTotal (0 if none).`;
  const t=await callClaude([{role:"user",content:`Nutrition for: ${JSON.stringify(items)}`}],sys);
  try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return[];}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayKey(){ return new Date().toISOString().split("T")[0]; }

function allIngs(){
  return[
    ...DB.ingredients.map(i=>({id:String(i.id),label:i.productName,cal:i.caloriesPerServing,pro:i.protein||0,carb:i.carbs||0,fat:i.fat||0,fib:i.fiber||0,type:"pkg"})),
    ...DB.rawIngredients.map(i=>({id:String(i.id),label:`${i.name} (${i.quantity}${i.unit})`,cal:i.caloriesTotal||0,pro:i.proteinTotal||0,carb:i.carbsTotal||0,fat:i.fatTotal||0,fib:i.fiberTotal||0,type:"raw"})),
  ];
}

function calcTotals(ings,qty=1){
  const lib=allIngs(); let cal=0,pro=0,carb=0,fat=0,fib=0;
  ings.forEach(ri=>{
    const ing=lib.find(a=>a.id===String(ri.ingredientId)); if(!ing)return;
    cal+=ing.cal*ri.qty*qty; pro+=(ing.pro||0)*ri.qty*qty;
    carb+=(ing.carb||0)*ri.qty*qty; fat+=(ing.fat||0)*ri.qty*qty; fib+=(ing.fib||0)*ri.qty*qty;
  });
  return{cal:Math.round(cal),pro:pro.toFixed(1),carb:carb.toFixed(1),fat:fat.toFixed(1),fib:fib.toFixed(1),netCarb:(carb-fib).toFixed(1)};
}

function pillsHTML(items){
  return`<div class="mrow">${items.map(([l,v,u,c])=>`<div class="mpill"><div class="mpv" style="color:${c||'var(--acc)'}">${v??"-"}${v!=null?u:""}</div><div class="mpl">${l}</div></div>`).join("")}</div>`;
}

function fmt(n){ return typeof n==="number"?n.toFixed(1):n; }

// ── Router ────────────────────────────────────────────────────────────────────
let TAB="dashboard";
const TABS=[["dashboard","Overview"],["scan","Scan"],["raw","Ingredients"],["recipes","Recipes"],["diet","Daily Diet"]];
function navigate(tab){TAB=tab;render();}
function render(){
  document.getElementById("nav").innerHTML=TABS.map(([id,lbl])=>`<button class="nb${TAB===id?" on":""}" onclick="navigate('${id}')">${lbl}</button>`).join("");
  const pg=document.getElementById("page");
  if(TAB==="dashboard") pg.innerHTML=dashHTML();
  else if(TAB==="scan") renderScan();
  else if(TAB==="raw") renderRaw();
  else if(TAB==="recipes") renderRecipes();
  else if(TAB==="diet") renderDiet();
  bindAfterRender();
}

// ════════════════════════════════════════════════════════════════════
// ── DASHBOARD ────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════
function dashHTML(){
  const top=[...DB.rawIngredients,...DB.ingredients.map(i=>({...i,name:i.productName,caloriesTotal:i.caloriesPerServing}))].sort((a,b)=>b.caloriesTotal-a.caloriesTotal).slice(0,5);
  const recent=[...DB.recipes].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,3);
  // Today's diet summary
  const today=DB.dailyDiet?.[todayKey()]||[];
  const todayCal=today.reduce((s,e)=>s+e.cal,0);
  const target=DB.calorieTarget||2000;
  const pct=Math.min(100,Math.round(todayCal/target*100));
  const barClass=pct>100?"over":pct>85?"warn":"";
  return`
  <h2 class="h1">Overview</h2>
  <p class="sub">Your nutrition hub — ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</p>

  <div class="card" style="background:linear-gradient(135deg,var(--acc-light),rgba(52,199,89,.06))">
    <div class="ct">Today's Calories</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px">
      <span style="font-size:40px;font-weight:700;color:var(--acc);letter-spacing:-1px">${todayCal}</span>
      <span style="font-size:14px;color:var(--mut);font-weight:500">/ ${target} kcal target</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--mut)">
      <span>${target-todayCal>0?`${target-todayCal} kcal remaining`:`${todayCal-target} kcal over target`}</span>
      <span>${pct}%</span>
    </div>

function camboxClick(){if(!scanCaptured&&!camStream) document.getElementById("fileinput").click();}
function handleDrop(e){
  e.preventDefault(); document.getElementById("cambox").classList.remove("drag");
  const f=e.dataTransfer.files[0];
  if(!f) return;
  if(!f.type.startsWith("image/")&&!f.name.match(/\.(heic|heif|jpg|jpeg|png|gif|webp|bmp|tiff?)$/i)){toast("Please upload an image file","e");return;}
  convertToJpeg(f);
}
function handleFileInput(inp){const f=inp.files[0];if(f) convertToJpeg(f);}
function convertToJpeg(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement("canvas");
    const MAX=1800; let w=img.naturalWidth,h=img.naturalHeight;
    if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    showCaptured(canvas.toDataURL("image/jpeg",0.90));
  };
  img.onerror=function(){
    URL.revokeObjectURL(url);
    const reader=new FileReader();
    reader.onload=ev=>{
      if(file.name.match(/\.(heic|heif)$/i)) toast("HEIC photo detected — if analysis fails go to iPhone Settings → Camera → Formats → Most Compatible","i");
      showCaptured(ev.target.result);
    };
    reader.readAsDataURL(file);
  };
  img.src=url;
}
async function startCam(){
  const errEl=document.getElementById("camerr"); errEl.style.display="none";
  if(!navigator.mediaDevices?.getUserMedia){errEl.textContent="⚠ Camera not available. Use Upload instead.";errEl.style.display="block";return;}
  try{
    if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920}}});}
    catch{stream=await navigator.mediaDevices.getUserMedia({video:true});}
    camStream=stream;
    const vid=document.getElementById("camvid"),hint=document.getElementById("camhint"),img=document.getElementById("camimg");
    vid.srcObject=stream;vid.style.display="block";hint.style.display="none";img.style.display="none";
    await vid.play();
    document.getElementById("cambuts").innerHTML=`<button class="btn bp" onclick="captureFrame()">📸 Capture</button><button class="btn bs" onclick="stopCam()">✕ Stop</button>`;
    scanCaptured=null;scanResult=null;
    document.getElementById("scanresult").innerHTML=`<div class="empty"><div class="empty-icon">🎯</div>Point at the label then click Capture</div>`;
  }catch(err){
    errEl.textContent=err.name==="NotAllowedError"?"⚠ Camera permission denied. Check your browser address bar.":err.name==="NotFoundError"?"⚠ No camera found. Use Upload instead.":`⚠ ${err.message}`;
    errEl.style.display="block";
  }
}
function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const vid=document.getElementById("camvid"),hint=document.getElementById("camhint");
  if(vid){vid.style.display="none";vid.srcObject=null;}if(hint)hint.style.display="flex";
  document.getElementById("cambuts").innerHTML=`<button class="btn bp" onclick="startCam()">▶ Camera</button><button class="btn bs" onclick="document.getElementById('fileinput').click()">↑ Upload</button>`;
}
function captureFrame(){
  const vid=document.getElementById("camvid"),canvas=document.createElement("canvas");
  canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  canvas.getContext("2d").drawImage(vid,0,0);
  stopCam();showCaptured(canvas.toDataURL("image/jpeg",0.92));
}
function showCaptured(dataUrl){
  scanCaptured=dataUrl;scanResult=null;
  const img=document.getElementById("camimg"),hint=document.getElementById("camhint");
  if(img){img.src=dataUrl;img.style.display="block";}if(hint)hint.style.display="none";
  document.getElementById("cambuts").innerHTML=`<button class="btn bp" onclick="analyzeLabel()">✦ Analyze</button><button class="btn bs" onclick="resetScan()">✕ Remove</button>`;
  document.getElementById("scanresult").innerHTML=`<div class="empty"><div class="empty-icon">✨</div>Click <strong style="color:var(--acc)">Analyze</strong> to extract nutrition info</div>`;
}
function restoreScanImage(){
  const img=document.getElementById("camimg"),hint=document.getElementById("camhint");
  if(img){img.src=scanCaptured;img.style.display="block";}if(hint)hint.style.display="none";
  document.getElementById("cambuts").innerHTML=`<button class="btn bp" onclick="analyzeLabel()">✦ Analyze</button><button class="btn bs" onclick="resetScan()">✕ Remove</button>`;
}
async function analyzeLabel(){
  if(!scanCaptured) return;
  const ld=document.getElementById("scanld");ld.style.display="flex";
  document.getElementById("scanresult").innerHTML="";
  try{
    const info=await scanLabel(scanCaptured);
    ld.style.display="none";
    if(!info){document.getElementById("scanresult").innerHTML=`<div class="errbox">Could not parse label. Try a clearer, well-lit photo showing the full nutrition panel.</div>`;return;}
    scanResult=info;showScanResult(info);
  }catch(err){
    ld.style.display="none";
    document.getElementById("scanresult").innerHTML=`<div class="errbox"><strong>Error:</strong> ${err.message}</div>`;
  }
}

  </div>
  ${pillsHTML([["Protein",info.protein,"g","var(--acc)"],["Carbs",info.carbs,"g","var(--ora)"],["Net Carbs",netC.toFixed(1),"g","var(--pur)"],["Fibre",fib,"g","var(--acc2)"],["Fat",info.fat,"g","var(--red)"]])}
  ${info.ingredients?`<div style="margin-top:12px;font-size:11px;color:var(--mut);line-height:1.6;padding:10px;background:var(--card2);border-radius:8px"><strong style="color:var(--txt)">Ingredients: </strong>${info.ingredients}</div>`:""}
  <button class="btn bp" style="margin-top:14px;width:100%;justify-content:center" onclick="savePackaged()">+ Save to Library</button>`;

function savePackaged(){

  const customName=(document.getElementById("savename")?.value||"").trim()||scanResult.productName;

function resetScan(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}scanCaptured=null;scanResult=null;render();}
function delIng(id){DB.ingredients=DB.ingredients.filter(i=>String(i.id)!==id);saveDB();render();}

function renderRecCreate(){

    ${DB.rawIngredients.length?`<optgroup label="🥦 Raw">${DB.rawIngredients.map(i=>`<option value="${i.id}">${i.name} ${i.quantity}${i.unit} · ${Math.round(i.caloriesTotal)} kcal</option>`).join("")}</optgroup>`:""}`;

function rerenderRecPreview(){
  const prev=calcTotals(recIng.filter(r=>r.ingredientId));

  if(el) el.innerHTML=recIng.some(r=>r.ingredientId)?`<div class="hero"><div class="hv">${prev.cal}</div><div class="hl">kcal · ${prev.pro}g protein · ${prev.netCarb}g net carbs · ${prev.fib}g fibre</div></div>`:"";
}
function saveRecipe(){
  recName=document.getElementById("rname")?.value.trim()||recName;
  recDesc=document.getElementById("rdesc")?.value.trim()||recDesc;
  if(!recName){toast("Enter a recipe name","e");return;}
  const valid=recIng.filter(r=>r.ingredientId&&r.qty>0);
  if(!valid.length){toast("Add at least one ingredient","e");return;}
  DB.recipes.push({id:Date.now(),name:recName,description:recDesc,ingredients:valid,createdAt:new Date().toISOString()});
  saveDB();toast(`✓ Saved: ${recName}`);recMode="list";render();
}
function delRecipe(id){
  if(!confirm("Delete this recipe?"))return;
  DB.recipes=DB.recipes.filter(r=>String(r.id)!==String(id));saveDB();toast("Deleted");render();
}

// ════════════════════════════════════════════════════════════════════
// ── DAILY DIET ───────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════
let dietViewDate = todayKey();

// ── Profile helpers ──────────────────────────────────────────────────────────
function activeProfile(){
  if(!DB.profiles||DB.profiles.length===0) return null;
  return DB.profiles.find(p=>p.id===DB.activeProfile)||DB.profiles[0];
}
function profileDiet(){
  const p=activeProfile();
  if(!p) return DB.dailyDiet||{};   // legacy fallback
  if(!p.dailyDiet) p.dailyDiet={};
  return p.dailyDiet;
}
function profileTarget(){
  const p=activeProfile();
  return (p?p.calorieTarget:null)||DB.calorieTarget||2000;
}
function setProfileTarget(v){
  const p=activeProfile();
  if(p) p.calorieTarget=v; else DB.calorieTarget=v;
  saveDB();
}
function migrateToProfiles(){
  // One-time migration: wrap existing dailyDiet data into a default profile
  if(DB.profiles&&DB.profiles.length>0) return;
  const defaultProfile={id:"p_default",name:"Me",emoji:"😊",calorieTarget:DB.calorieTarget||2000,dailyDiet:DB.dailyDiet||{},createdAt:new Date().toISOString()};
  DB.profiles=[defaultProfile];
  DB.activeProfile="p_default";
  saveDB();
}
function getDay(dateKey){
  return profileDiet()[dateKey]||[];
}
function setDay(dateKey, entries){
  const diet=profileDiet();
  diet[dateKey]=entries;
  saveDB();
}

function last30Days(){
  const days=[];
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function fmtDateLabel(key){
  const today=todayKey();
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey=yesterday.toISOString().split("T")[0];
  if(key===today) return"Today";
  if(key===yKey) return"Yesterday";
  const d=new Date(key+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function fmtDayFull(key){
  const d=new Date(key+"T00:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}

function dietTotals(entries){
  return entries.reduce((acc,e)=>({
    cal:acc.cal+e.cal, pro:acc.pro+(e.pro||0),
    carb:acc.carb+(e.carb||0), fat:acc.fat+(e.fat||0),
    fib:acc.fib+(e.fib||0)
  }),{cal:0,pro:0,carb:0,fat:0,fib:0});
}

function renderDiet(){
  const days=last30Days();
  const entries=getDay(dietViewDate);
  const tot=dietTotals(entries);
  const netCarb=Math.max(0,tot.carb-tot.fib);
  const target=profileTarget();
  const pct=Math.min(100,Math.round(tot.cal/target*100));
  const barClass=pct>100?"over":pct>85?"warn":"";
  const isToday=dietViewDate===todayKey();

  const prof=activeProfile();
  const profName=prof?prof.name:"Me";
  const profEmoji=prof?prof.emoji:"😊";

  document.getElementById("page").innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <h2 class="h1" style="margin-bottom:2px">Daily Diet</h2>
      <p style="color:var(--mut);font-size:13px">Track meals day by day · 30-day history</p>
    </div>
    <button onclick="showProfileModal()" style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--sur);border:1.5px solid var(--bor);border-radius:20px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);font-family:'Inter',sans-serif" onmouseenter="this.style.borderColor='var(--acc)'" onmouseleave="this.style.borderColor='var(--bor)'">
      <span style="font-size:20px">${profEmoji}</span>
      <div style="text-align:left">
        <div style="font-size:13px;font-weight:700;color:var(--txt)">${profName}</div>
      </div>
      <span style="color:var(--mut2);font-size:14px;margin-left:2px">›</span>
    </button>
  </div>

  <!-- Day selector -->
  <div class="day-tabs" id="daytabs">
    ${days.map(d=>{
      const ents=getDay(d); const cal=ents.reduce((s,e)=>s+e.cal,0);
      return`<div class="day-pill${d===dietViewDate?" on":""}" onclick="dietViewDate='${d}';renderDiet()">
        <div>${fmtDateLabel(d)}</div>
        ${ents.length?`<div style="font-size:10px;opacity:.75;margin-top:1px">${cal} kcal</div>`:`<div style="font-size:10px;opacity:.5;margin-top:1px">—</div>`}
      </div>`;
    }).join("")}
  </div>

  <!-- Day header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--txt)">${fmtDayFull(dietViewDate)}</div>
      <div style="font-size:12px;color:var(--mut);margin-top:2px">${entries.length} item${entries.length!==1?"s":""} logged</div>
    </div>
    ${isToday?`<button class="btn bp sm" onclick="showAddToDietModal()">+ Add Item</button>`:""}
  </div>

  <!-- Calorie progress -->
  <div class="card" style="background:linear-gradient(135deg,var(--acc-light),rgba(52,199,89,.06))">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <span style="font-size:32px;font-weight:700;color:var(--acc);letter-spacing:-1px">${tot.cal}</span>
      <span style="font-size:13px;color:var(--mut)">/ ${target} kcal</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--mut)">
      <span>${target-tot.cal>0?`${target-tot.cal} kcal remaining`:`${tot.cal-target} kcal over`}</span>
      <span>${pct}% of target</span>
    </div>
    <!-- Macro summary -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px">
      ${[["Protein",tot.pro.toFixed(1),"g","var(--acc)"],["Net Carbs",netCarb.toFixed(1),"g","var(--pur)"],["Fibre",tot.fib.toFixed(1),"g","var(--acc2)"],["Fat",tot.fat.toFixed(1),"g","var(--red)"]].map(([l,v,u,c])=>`
      <div style="text-align:center;background:rgba(255,255,255,.6);border-radius:10px;padding:8px 4px">
        <div style="font-size:15px;font-weight:700;color:${c}">${v}${u}</div>
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);font-weight:500;margin-top:2px">${l}</div>
      </div>`).join("")}
    </div>
  </div>

  <!-- Entries list -->
  <div class="card">
    <div class="ct">Meals & Items</div>
    ${entries.length===0?`<div class="empty"><div class="empty-icon">🍽</div>${isToday?"Nothing logged yet today.<br/>Tap + Add Item to start.":"No entries for this day."}</div>`:`
    ${entries.map((e,idx)=>`
      <div class="diet-item">
        <div class="diet-icon" style="background:${e.type==="recipe"?"var(--acc-light)":e.type==="pkg"?"#fff3e0":"var(--acc2-light)"}">
          ${e.type==="recipe"?"🍳":e.type==="pkg"?"📦":"🥦"}
        </div>
        <div class="diet-info">
          <div class="diet-name">${e.name}</div>
          <div class="diet-meta">${e.qty} × ${e.portionLabel} · ${(e.pro||0).toFixed(1)}g protein · ${Math.max(0,(e.carb||0)-(e.fib||0)).toFixed(1)}g net carbs</div>
        </div>
        <div class="diet-cal">${e.cal} kcal</div>
        ${isToday?`<button class="btn br sm" style="flex-shrink:0" onclick="removeDietEntry(${idx})">✕</button>`:""}
      </div>`).join("")}`}
  </div>

  ${!isToday&&entries.length===0?`<div style="text-align:center;padding:8px 0"><button class="btn bs sm" onclick="dietViewDate=todayKey();renderDiet()">→ Go to Today</button></div>`:""}`;

  // Scroll to today pill
  const todayPill=document.querySelector(".day-pill.on");
  if(todayPill) todayPill.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}

function removeDietEntry(idx){
  const entries=getDay(dietViewDate);
  entries.splice(idx,1);
  setDay(dietViewDate,entries);
  renderDiet();
}

function showAddToDietModal(){
  const m=document.getElementById("modal");
  m.style.display="flex"; m.className="modal-overlay";
  const lib=allIngs();
  m.innerHTML=`<div class="modal">

    <div style="font-size:18px;font-weight:700;margin-bottom:16px">Add to Today's Diet</div>

    ${DB.recipes.length?`<div class="sdiv">🍳 Recipes</div>
    ${DB.recipes.map(rec=>{const t=calcTotals(rec.ingredients);return`

        <span style="font-size:11px;color:var(--mut)">srv</span>
        <button class="btn bp sm" onclick="addRecipeToDietFromModal('${rec.id}')">Add</button>

    </div>`;}).join("")}`:""}

    <!-- Individual ingredients section -->
    ${lib.length?`<div class="sdiv" style="margin-top:12px">🥦📦 Ingredients</div>
    ${lib.map(ing=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border-radius:10px;margin-bottom:6px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ing.label}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:2px">${ing.cal} kcal/portion · ${(ing.pro||0).toFixed(1)}g protein</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <input type="number" id="iqty_${ing.id}" min=".1" step=".1" value="1" style="width:52px;padding:6px 8px;border:1.5px solid var(--bor);border-radius:8px;font-size:13px;font-weight:600;text-align:center;background:var(--sur);color:var(--txt);font-family:'Inter',sans-serif"/>
        <span style="font-size:11px;color:var(--mut)">×</span>
        <button class="btn bg2 sm" onclick="addIngToDiet('${ing.id}')">Add</button>
      </div>
    </div>`).join("")}`:""}

    ${(!DB.recipes.length&&!lib.length)?`<div class="empty">No ingredients or recipes yet.<br/>Add some in the other tabs first.</div>`:""}

    <button class="btn bs" style="width:100%;justify-content:center;margin-top:14px" onclick="document.getElementById('modal').style.display='none'">Done</button>
  </div>`;
}

function addRecipeToDietFromModal(recId){
  const rec=DB.recipes.find(r=>String(r.id)===String(recId));
  if(!rec) return;
  const qty=parseFloat(document.getElementById(`rqty_${recId}`)?.value)||1;
  const t=calcTotals(rec.ingredients,qty);
  const entries=getDay(todayKey());
  entries.push({name:rec.name,qty,portionLabel:`serving${qty!==1?"s":""}`,cal:t.cal,pro:parseFloat(t.pro),carb:parseFloat(t.carb),fat:parseFloat(t.fat),fib:parseFloat(t.fib),type:"recipe",addedAt:new Date().toISOString()});
  setDay(todayKey(),entries);
  toast(`✓ Added ${rec.name} (${t.cal} kcal)`);
}

function addIngToDiet(ingId){
  const lib=allIngs();
  const ing=lib.find(a=>a.id===String(ingId));
  if(!ing) return;
  const qty=parseFloat(document.getElementById(`iqty_${ingId}`)?.value)||1;
  const entries=getDay(todayKey());
  entries.push({name:ing.label,qty,portionLabel:"portion",cal:Math.round(ing.cal*qty),pro:parseFloat(((ing.pro||0)*qty).toFixed(1)),carb:parseFloat(((ing.carb||0)*qty).toFixed(1)),fat:parseFloat(((ing.fat||0)*qty).toFixed(1)),fib:parseFloat(((ing.fib||0)*qty).toFixed(1)),type:ing.type,addedAt:new Date().toISOString()});
  setDay(todayKey(),entries);
  toast(`✓ Added ${ing.label} (${Math.round(ing.cal*qty)} kcal)`);
}

function addRecipeToDiet(recId){
  document.getElementById("modal").style.display="none";
  showAddToDietModal();
  // scroll to recipe
  setTimeout(()=>{
    const el=document.getElementById(`rqty_${recId}`);
    if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
  },100);
}

        <input id="pname" class="inp" placeholder="e.g. Sarah, Dad, Mum…" value="${editing?editing.name:""}" style="margin-bottom:14px"/>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);font-weight:600;margin-bottom:8px">Daily Calorie Target</div>
        <input id="ptarget" class="inp" type="number" placeholder="e.g. 1800" value="${editing?editing.calorieTarget:""}" style="margin-bottom:14px"/>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);font-weight:600;margin-bottom:10px">Choose Emoji</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
          ${PROFILE_EMOJIS.map(e=>`<div onclick="selectEmoji('${e}')" id="emoji_${e}" style="width:40px;height:40px;border-radius:10px;border:${(editing?editing.emoji:PROFILE_EMOJIS[0])===e?"2px solid var(--acc)":"1.5px solid var(--bor)"};display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s;background:${(editing?editing.emoji:PROFILE_EMOJIS[0])===e?"var(--acc-light)":"var(--card2)"}">${e}</div>`).join("")}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn bp" style="flex:1;justify-content:center" onclick="saveProfile(${editId?`'${editId}'`:null})">${editing?"Save Changes":"Create Profile"}</button>
          <button class="btn bs" onclick="document.getElementById('profile-list').style.display='block';document.getElementById('profile-form').style.display='none'">Cancel</button>
        </div>
      </div>`;
    // Set selected emoji
    window._selectedEmoji = editing ? editing.emoji : PROFILE_EMOJIS[0];
  }
}

function showEditProfile(id){showAddProfileForm(id);}

function selectEmoji(e){
  window._selectedEmoji = e;
  document.querySelectorAll("[id^='emoji_']").forEach(el=>{
    const isSelected = el.id === `emoji_${e}`;
    el.style.border = isSelected ? "2px solid var(--acc)" : "1.5px solid var(--bor)";
    el.style.background = isSelected ? "var(--acc-light)" : "var(--card2)";
  });
}

function saveProfile(editId){
  const name = (document.getElementById("pname")?.value||"").trim();
  const target = parseInt(document.getElementById("ptarget")?.value)||2000;
  const emoji = window._selectedEmoji || PROFILE_EMOJIS[0];
  if(!name){toast("Enter a name for this profile","e");return;}
  if(!DB.profiles) DB.profiles=[];
  if(editId){
    const p = DB.profiles.find(p=>p.id===editId);
    if(p){p.name=name;p.calorieTarget=target;p.emoji=emoji;}
  } else {
    const id = "p_"+Date.now();
    DB.profiles.push({id,name,emoji,calorieTarget:target,dailyDiet:{},createdAt:new Date().toISOString()});
    if(DB.profiles.length===1) DB.activeProfile=id;
  }
  saveDB();
  toast(editId?"✓ Profile updated":"✓ Profile created — tap to switch");
  renderProfileModal();
}

function switchProfile(id){
  DB.activeProfile = id;
  dietViewDate = todayKey(); // reset to today when switching
  saveDB();
  document.getElementById("modal").style.display="none";
  toast(`✓ Switched to ${DB.profiles.find(p=>p.id===id)?.name||"profile"}`);
  render();
}

function deleteProfile(id){
  if(DB.profiles.length<=1){toast("Can't delete the only profile","e");return;}
  const p = DB.profiles.find(x=>x.id===id);
  if(!confirm(`Delete ${p?.name||"this profile"} and all their diet history?`)) return;
  DB.profiles = DB.profiles.filter(x=>x.id!==id);
  if(DB.activeProfile===id) DB.activeProfile=DB.profiles[0]?.id;
  saveDB();
  toast("Profile deleted");
  renderProfileModal();
}

// ── After-render hooks ────────────────────────────────────────────────────────
function bindAfterRender(){
  if(recMode==="create"){
    document.querySelectorAll("#recings select").forEach((sel,i)=>{if(recIng[i]?.ingredientId)sel.value=recIng[i].ingredientId;});
  }
}

// ── Service Worker ────────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js")
    .then(r=>console.log("SW:",r.scope)).catch(e=>console.log("SW err:",e));
}

// ── iOS install banner ────────────────────────────────────────────────────────
function showInstallBanner(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari=/safari/i.test(navigator.userAgent)&&!/chrome/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true;
  if(!isIOS||!isSafari||isStandalone||localStorage.getItem("install_dismissed")) return;
  const banner=document.createElement("div");
  banner.style.cssText=`position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bor);padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));z-index:500;display:flex;align-items:center;gap:12px;animation:su .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.1)`;
  banner.innerHTML=`
    <img src="/icon-60.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0"/>
    <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:var(--txt)">Add to Home Screen</div>
    <div style="font-size:12px;color:var(--mut);margin-top:2px">Tap <strong style="color:var(--txt)">Share</strong> → <strong style="color:var(--txt)">Add to Home Screen</strong></div></div>
    <button onclick="this.closest('div').remove();localStorage.setItem('install_dismissed','1')" style="border:none;background:transparent;color:var(--mut2);font-size:22px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0">×</button>`;
  document.body.appendChild(banner);
}

// ── Auto-reset today's diet at midnight ──────────────────────────────────────
function checkMidnightReset(){
  migrateToProfiles();
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  const cutKey=cutoff.toISOString().split("T")[0];
  // Prune old entries from all profiles
  (DB.profiles||[]).forEach(p=>{
    if(!p.dailyDiet) p.dailyDiet={};
    Object.keys(p.dailyDiet).forEach(k=>{ if(k<cutKey) delete p.dailyDiet[k]; });
  });
  saveDB();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async()=>{
  document.getElementById("page").innerHTML=`<div style="text-align:center;padding:80px;color:var(--mut);font-size:14px"><div class="spin" style="margin:0 auto 16px;border-top-color:var(--acc)"></div>Loading…</div>`;
  await loadDB();
  checkMidnightReset();
  render();
  setTimeout(showInstallBanner,3000);
  // Sync from server every 30s
  setInterval(async()=>{
    try{
      const r=await fetch("/api/data"); if(!r.ok) return;
      const fresh=await r.json();
      if(JSON.stringify(fresh)!==JSON.stringify(DB)){ DB={...DB,...fresh}; render(); }
    }catch{}
  },30000);
})();
</script>
</body>
</html>
