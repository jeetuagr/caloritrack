<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="CaloriTrack"/>
<meta name="theme-color" content="#f8f6f6"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<title>CaloriTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ec5b13","bg-app":"#f8f6f6",success:"#22c55e","accent-blue":"#3b82f6","accent-pink":"#ec4899","accent-orange":"#f97316","accent-purple":"#a855f7"},fontFamily:{display:["Public Sans","sans-serif"]}}}}
</script>
<style>
*,*::before,*::after{box-sizing:border-box}
html{overflow-x:hidden;background:#f8f6f6}
body{font-family:'Public Sans',sans-serif;background:#f8f6f6;color:#1e293b;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none}
.fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

/* Safe areas */
.hdr{padding-top:calc(env(safe-area-inset-top) + 12px) !important}
.bottom-nav{padding-bottom:calc(env(safe-area-inset-bottom) + 8px) !important}
.page-content{padding-bottom:calc(env(safe-area-inset-bottom) + 80px) !important}

/* Progress ring animation */
.progress-ring{transform:rotate(-90deg)}
@keyframes ring-fill{from{stroke-dashoffset:553}to{stroke-dashoffset:var(--target-offset)}}
.ring-animated{animation:ring-fill .8s ease-out forwards}

/* Ingredient input rows */
.ing-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.ing-row input,.ing-row select{font-family:'Public Sans',sans-serif;font-size:16px;background:#f8f6f6;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 10px;color:#1e293b;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;min-width:0;width:100%}
.ing-row input:focus,.ing-row select:focus{border-color:#ec5b13;background:#fff}
.ing-row input::placeholder{color:#94a3b8}

/* Toast */
.toast-el{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;animation:toast-in .25s ease;max-width:300px;text-align:center;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)}
@keyframes toast-in{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* Modal slide up */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px;padding-bottom:max(20px,env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal-wrap{align-items:center;padding:20px}.modal-box{border-radius:20px}}

/* Diet day pills */
.day-pill-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;width:52px;height:66px;border-radius:14px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s;font-family:'Public Sans',sans-serif}
.day-pill-btn.active{background:#ec5b13;border-color:#ec5b13;color:#fff;box-shadow:0 4px 12px rgba(236,91,19,.3)}
.day-pill-btn:not(.active){color:#64748b}

/* Spin */
.spin{width:20px;height:20px;border:2.5px solid #e2e8f0;border-top-color:#ec5b13;border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border-radius:12px;border:1px solid #e2e8f0}
.tbl{border-collapse:collapse;width:100%;min-width:560px;table-layout:auto}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;padding:10px 12px;border-bottom:1px solid #e2e8f0;font-weight:700;background:#f8fafc}
.tbl td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}

/* Camera box */
.cam-box{width:100%;aspect-ratio:4/3;max-height:260px;background:#f8fafc;border:2px dashed #cbd5e1;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.cam-box.drag{border-color:#ec5b13;background:#fff5f0}
.cam-box video,.cam-box img{width:100%;height:100%;object-fit:cover;display:block}

/* Recipe card */
.rec-card{background:#fff;border-radius:20px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:0;margin-bottom:10px}
.rec-card:active{transform:scale(0.98)}

/* Rir (ingredient row in recipe builder) */
.rir{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9}
.rir:last-child{border-bottom:none}

/* Macro rows — inline label+value per row */
.macro-grid{display:flex;flex-direction:column;gap:4px;width:100%}
.macro-row{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:7px 10px;overflow:hidden}
.macro-row-val{font-size:14px;font-weight:700;white-space:nowrap}
.macro-row-lbl{font-size:11px;font-weight:600;opacity:.75;margin-left:4px}

/* Global overflow guards */
.page-content *{min-width:0}
.page-content img{max-width:100%;height:auto}
</style>
</head>
<body>

<!-- App shell -->
<div id="app-shell" class="flex flex-col min-h-dvh">

  <!-- Header -->
  <header id="app-header" class="hdr bg-white border-b border-slate-200 sticky top-0 z-50 px-4 pb-0">
    <div class="flex items-center justify-between py-3">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">local_fire_department</span>
        <h1 class="text-xl font-bold tracking-tight">CaloriTrack</h1>
      </div>
      <div class="flex items-center gap-2" id="header-actions">
        <!-- injected per page -->
      </div>
    </div>
    <!-- Tab nav -->
    <nav class="flex overflow-x-auto no-scrollbar border-t border-slate-100" id="tab-nav"></nav>
  </header>

  <!-- Page content -->
  <main class="page-content flex-1 max-w-lg mx-auto w-full px-4 pt-5 space-y-5" id="page"></main>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-200 px-4 pt-3 flex items-center justify-around z-50">
  <button onclick="navigate('dashboard')" id="bn-dashboard" class="flex flex-col items-center gap-0.5 text-primary">
    <span class="material-symbols-outlined fill-icon text-2xl">home</span>
    <span class="text-[10px] font-bold">Home</span>
  </button>
  <button onclick="navigate('scan')" id="bn-scan" class="flex flex-col items-center gap-0.5 text-slate-400">
    <span class="material-symbols-outlined text-2xl">qr_code_scanner</span>
    <span class="text-[10px] font-bold">Scan</span>
  </button>
  <!-- FAB -->
  <div class="relative -top-5">
    <button onclick="navigate('raw')" class="w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/30 border-4 border-white">
      <span class="material-symbols-outlined text-3xl">add</span>
    </button>
  </div>
  <button onclick="navigate('recipes')" id="bn-recipes" class="flex flex-col items-center gap-0.5 text-slate-400">
    <span class="material-symbols-outlined text-2xl">restaurant_menu</span>
    <span class="text-[10px] font-bold">Recipes</span>
  </button>
  <button onclick="navigate('diet')" id="bn-diet" class="flex flex-col items-center gap-0.5 text-slate-400">
    <span class="material-symbols-outlined text-2xl">calendar_month</span>
    <span class="text-[10px] font-bold">Diet</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast-el" class="toast-el" style="display:none"></div>
<!-- Modal -->
<div id="modal-root" style="display:none"></div>

<script>
// ════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════
let DB={ingredients:[],rawIngredients:[],recipes:[],dailyDiet:{},calorieTarget:2000,profiles:[],activeProfile:null};
let _saveTimer=null;
async function loadDB(){try{const r=await fetch("/api/data");if(r.ok)DB={...DB,...await r.json()};}catch(e){console.warn(e);}}
function saveDB(){clearTimeout(_saveTimer);_saveTimer=setTimeout(async()=>{try{await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DB)});}catch(e){console.warn(e);}},400);}

// ════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════
let _tt;
function toast(msg,type="s"){
  const el=document.getElementById("toast-el");
  el.textContent=msg;
  el.style.display="block";
  el.className="toast-el";
  el.style.background=type==="e"?"#ef4444":type==="i"?"#22c55e":"#1e293b";
  el.style.color="#fff";
  clearTimeout(_tt);_tt=setTimeout(()=>el.style.display="none",3500);
}

// ════════════════════════════════════════════════════════
// CLAUDE API
// ════════════════════════════════════════════════════════
async function callClaude(messages,system=""){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages};
  if(system)body.system=system;
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  if(!r.ok||d.error)throw new Error(d.error||"API error "+r.status);
  return d.content?.map(b=>b.text||"").join("")||"";
}
// ── Food image generation ────────────────────────────────────────────────────
const _imgCache = {}; // session cache: name -> dataURI

async function generateFoodImage(name) {
  if (!name) return null;
  const key = name.toLowerCase().trim();
  if (_imgCache[key]) return _imgCache[key];
  try {
    const r = await fetch("/api/food-image", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name})
    });
    const d = await r.json();
    if (d.imageUrl) {
      _imgCache[key] = d.imageUrl;
      return d.imageUrl;
    }
  } catch(e) { console.warn("Image gen failed:", e); }
  return null;
}

// Render a food image element with fallback placeholder
function foodImgHTML(imageUrl, name, size=80, radius=16) {
  if (imageUrl) {
    return `<img src="${imageUrl}" alt="${name}" style="width:${size}px;height:${size}px;border-radius:${radius}px;object-fit:cover;display:block;flex-shrink:0"/>`;
  }
  // Placeholder while loading or if failed
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;background:linear-gradient(135deg,#ffedd5,#fef3c7);display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <span class="material-symbols-outlined" style="font-size:${Math.round(size*0.45)}px;color:rgba(236,91,19,.4)">restaurant</span>
  </div>`;
}

async function scanLabel(dataUrl){
  const parts=dataUrl.split(",");
  const mime=(parts[0].match(/data:(image\/[^;]+)/)||[])[1]||"image/jpeg";
  const safeMime=["image/jpeg","image/png","image/gif","image/webp"].includes(mime)?mime:"image/jpeg";
  const sys=`You are a nutrition label reader. Return ONLY a raw JSON object, no markdown:\n{"productName":string,"servingSize":string,"caloriesPerServing":number,"protein":number,"carbs":number,"fat":number,"fiber":number|null,"ingredients":string}`;
  const t=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:safeMime,data:parts[1]}},{type:"text",text:"Extract nutrition info as JSON."}]}],sys);
  try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function lookupCalories(items){
  const sys=`You are a precise nutrition data expert. Return ONLY a raw JSON array, no markdown, no explanation.
Format: [{"name":string,"quantity":number,"unit":string,"caloriesTotal":number,"proteinTotal":number,"carbsTotal":number,"fatTotal":number,"fiberTotal":number}]

CRITICAL RULES:
1. If the item appears to be a BRANDED product (contains brand name, e.g. "Milky Mist", "Amul", "Britannia", "Quaker", "Kellogg's", etc.), use the specific nutritional values for THAT brand, NOT generic values. Branded products often have different macro profiles than generic versions.
2. Scale all values to the EXACT quantity and unit provided (e.g. 100g, 1 cup).
3. Always include fiberTotal (use 0 if truly none).
4. Be as accurate as possible — prioritize branded/specific data over generic USDA values when the item name suggests a specific product.
5. For Indian branded items, use their known label values (e.g. Milky Mist High Protein Paneer has ~25g protein per 100g, not the generic 18g).`;
  const t=await callClaude([{role:"user",content:`Provide accurate nutrition data for these specific items (use branded values if brand is mentioned):\n${JSON.stringify(items)}`}],sys);
  try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return[];}
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function todayKey(){return new Date().toISOString().split("T")[0];}
function fmt(n){return typeof n==="number"?n.toFixed(1):n;}

function allIngs(){
  return[
    ...DB.ingredients.map(i=>({id:String(i.id),label:i.productName,cal:i.caloriesPerServing,pro:i.protein||0,carb:i.carbs||0,fat:i.fat||0,fib:i.fiber||0,type:"pkg"})),
    ...DB.rawIngredients.map(i=>({id:String(i.id),label:`${i.name} (${i.quantity}${i.unit})`,cal:i.caloriesTotal||0,pro:i.proteinTotal||0,carb:i.carbsTotal||0,fat:i.fatTotal||0,fib:i.fiberTotal||0,type:"raw"})),
  ];
}
function calcTotals(ings,qty=1){
  const lib=allIngs();let cal=0,pro=0,carb=0,fat=0,fib=0;
  ings.forEach(ri=>{const ing=lib.find(a=>a.id===String(ri.ingredientId));if(!ing)return;cal+=ing.cal*ri.qty*qty;pro+=(ing.pro||0)*ri.qty*qty;carb+=(ing.carb||0)*ri.qty*qty;fat+=(ing.fat||0)*ri.qty*qty;fib+=(ing.fib||0)*ri.qty*qty;});
  return{cal:Math.round(cal),pro:pro.toFixed(1),carb:carb.toFixed(1),fat:fat.toFixed(1),fib:fib.toFixed(1),netCarb:Math.max(0,carb-fib).toFixed(1)};
}

// ════════════════════════════════════════════════════════
// PROFILE HELPERS
// ════════════════════════════════════════════════════════
function activeProfile(){
  if(!DB.profiles||!DB.profiles.length)return null;
  return DB.profiles.find(p=>p.id===DB.activeProfile)||DB.profiles[0];
}
function profileDiet(){const p=activeProfile();if(!p)return DB.dailyDiet||{};if(!p.dailyDiet)p.dailyDiet={};return p.dailyDiet;}
function profileTarget(){const p=activeProfile();return(p?p.calorieTarget:null)||DB.calorieTarget||2000;}
function setProfileTarget(v){const p=activeProfile();if(p)p.calorieTarget=v;else DB.calorieTarget=v;saveDB();}
function migrateToProfiles(){
  if(DB.profiles&&DB.profiles.length>0)return;
  DB.profiles=[{id:"p_default",name:"Me",emoji:"😊",calorieTarget:DB.calorieTarget||2000,dailyDiet:DB.dailyDiet||{},createdAt:new Date().toISOString()}];
  DB.activeProfile="p_default";saveDB();
}
function getDay(k){return profileDiet()[k]||[];}
function setDay(k,e){profileDiet()[k]=e;saveDB();}

// ════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════
let TAB="dashboard";
const TABS=[["dashboard","Overview"],["scan","Scan"],["raw","Ingredients"],["recipes","Recipes"],["diet","Daily Diet"]];

function navigate(tab){TAB=tab;render();}

function render(){
  // Tab nav
  document.getElementById("tab-nav").innerHTML=TABS.map(([id,lbl])=>`
    <button onclick="navigate('${id}')" class="flex-none px-4 py-3 text-sm font-bold border-b-2 transition-colors ${TAB===id?"border-primary text-primary":"border-transparent text-slate-400"}">${lbl}</button>
  `).join("");

  // Bottom nav highlight
  ["dashboard","scan","recipes","diet"].forEach(id=>{
    const bn=document.getElementById("bn-"+id);
    if(!bn)return;
    const isOn=TAB===id;
    bn.className=`flex flex-col items-center gap-0.5 ${isOn?"text-primary":"text-slate-400"}`;
    const icon=bn.querySelector(".material-symbols-outlined");
    if(icon)icon.className=`material-symbols-outlined ${isOn?"fill-icon":""} text-2xl`;
  });

  // Header actions
  document.getElementById("header-actions").innerHTML="";

  // Render page
  const pg=document.getElementById("page");
  pg.className="page-content flex-1 max-w-lg mx-auto w-full px-4 pt-4 space-y-4";
  if(TAB==="dashboard"){pg.innerHTML=dashHTML();animateRing();}
  else if(TAB==="scan")renderScan();
  else if(TAB==="raw")renderRaw();
  else if(TAB==="recipes")renderRecipes();
  else if(TAB==="diet")renderDiet();
  bindAfterRender();
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function dashHTML(){
  const today=getDay(todayKey());
  const todayCal=today.reduce((s,e)=>s+e.cal,0);
  const todayPro=today.reduce((s,e)=>s+(e.pro||0),0);
  const todayCarb=today.reduce((s,e)=>s+(e.carb||0),0);
  const todayFat=today.reduce((s,e)=>s+(e.fat||0),0);
  const target=profileTarget();
  const pct=Math.min(100,Math.round(todayCal/target*100));
  const circumference=553;
  const offset=Math.round(circumference*(1-pct/100));
  const ringColor=pct>100?"#ef4444":pct>85?"#f97316":"#22c55e";

  const top=[...DB.rawIngredients,...DB.ingredients.map(i=>({...i,name:i.productName,caloriesTotal:i.caloriesPerServing}))].sort((a,b)=>b.caloriesTotal-a.caloriesTotal).slice(0,5);
  const recent=[...DB.recipes].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,4);

  const prof=activeProfile();

  return`
  <!-- Heading -->
  <div>
    <h2 class="text-3xl font-bold">Overview</h2>
    <p class="text-slate-400 font-medium mt-1 flex items-center gap-1 text-sm">
      <span class="material-symbols-outlined text-sm">calendar_today</span>
      ${new Date().toLocaleDateString("en-US",{weekday:"long",day:"numeric",month:"long"})}
      ${prof?`<span class="ml-2 px-2 py-0.5 bg-orange-100 text-primary rounded-full text-xs font-bold">${prof.emoji} ${prof.name}</span>`:""}
    </p>
  </div>

  <!-- Calorie ring card -->
  <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 relative overflow-hidden">
    <div class="absolute top-0 right-0 p-4 opacity-10">
      <span class="material-symbols-outlined text-7xl text-slate-400">nutrition</span>
    </div>
    <div class="flex flex-col items-center text-center">
      <h3 class="text-base font-bold mb-4">Today's Calories</h3>
      <div class="relative flex items-center justify-center mb-5">
        <svg class="w-44 h-44 progress-ring">
          <circle class="text-slate-100" cx="88" cy="88" fill="transparent" r="80" stroke="currentColor" stroke-width="11"/>
          <circle id="ring-arc" cx="88" cy="88" fill="transparent" r="80"
            stroke="${ringColor}" stroke-width="11" stroke-linecap="round"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
            style="--target-offset:${offset};transition:stroke .3s"/>
        </svg>
        <div class="absolute flex flex-col items-center">
          <span class="text-4xl font-black">${todayCal.toLocaleString()}</span>
          <span class="text-sm font-medium text-slate-400">${target-todayCal>0?`${(target-todayCal).toLocaleString()} kcal left`:"Over target"}</span>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-3 w-full mb-5" style="max-width:100%">
        <div class="flex flex-col items-center bg-pink-50 rounded-2xl py-2.5 px-1 min-w-0">
          <span style="font-size:9px;font-weight:700;color:#ec4899;text-transform:uppercase;letter-spacing:.5px">Carbs</span>
          <span style="font-size:16px;font-weight:800;color:#1e293b;white-space:nowrap">${todayCarb.toFixed(0)}g</span>
        </div>
        <div class="flex flex-col items-center bg-blue-50 rounded-2xl py-2.5 px-1 min-w-0">
          <span style="font-size:9px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px">Protein</span>
          <span style="font-size:16px;font-weight:800;color:#1e293b;white-space:nowrap">${todayPro.toFixed(0)}g</span>
        </div>
        <div class="flex flex-col items-center bg-orange-50 rounded-2xl py-2.5 px-1 min-w-0">
          <span style="font-size:9px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:.5px">Fat</span>
          <span style="font-size:16px;font-weight:800;color:#1e293b;white-space:nowrap">${todayFat.toFixed(0)}g</span>
        </div>
      </div>
      <button onclick="navigate('diet')" class="w-full bg-primary text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-primary/20 hover:scale-[0.98] transition-transform text-sm">
        Open Daily Diet
      </button>
    </div>
  </div>

  <!-- Stats grid -->
  <div class="grid grid-cols-2 gap-3">
    ${[["package_2","text-accent-blue","bg-blue-50",DB.ingredients.length,"Packaged"],

function camboxClick(){if(!scanCaptured&&!camStream)document.getElementById("fileinput").click();}
function handleDrop(e){
  e.preventDefault();document.getElementById("cambox").classList.remove("drag");
  const f=e.dataTransfer.files[0];
  if(!f)return;
  if(!f.type.startsWith("image/")&&!f.name.match(/\.(heic|heif|jpg|jpeg|png|gif|webp|bmp|tiff?)$/i)){toast("Please upload an image file","e");return;}
  convertToJpeg(f);
}
function handleFileInput(inp){const f=inp.files[0];if(f)convertToJpeg(f);}
function convertToJpeg(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement("canvas");
    const MAX=1800;let w=img.naturalWidth,h=img.naturalHeight;
    if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);showCaptured(canvas.toDataURL("image/jpeg",.9));
  };
  img.onerror=function(){
    URL.revokeObjectURL(url);
    const reader=new FileReader();
    reader.onload=ev=>{
      if(file.name.match(/\.(heic|heif)$/i))toast("HEIC detected — if analysis fails, switch iPhone camera to Most Compatible format","i");
      showCaptured(ev.target.result);
    };
    reader.readAsDataURL(file);
  };
  img.src=url;
}
async function startCam(){
  const errEl=document.getElementById("camerr");errEl.style.display="none";
  if(!navigator.mediaDevices?.getUserMedia){errEl.textContent="⚠ Camera not available. Use Upload.";errEl.style.display="block";return;}
  try{
    if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920}}});}
    catch{stream=await navigator.mediaDevices.getUserMedia({video:true});}
    camStream=stream;
    const vid=document.getElementById("camvid"),hint=document.getElementById("camhint"),img=document.getElementById("camimg");
    vid.srcObject=stream;vid.style.display="block";hint.style.display="none";img.style.display="none";
    await vid.play();
    document.getElementById("cambuts").innerHTML=`
      <button onclick="captureFrame()" class="flex-1 flex items-center justify-center gap-1.5 bg-primary text-white font-bold py-2.5 rounded-xl text-sm"><span class="material-symbols-outlined text-base">photo_camera</span>Capture</button>
      <button onclick="stopCam()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-2.5 rounded-xl text-sm">Stop</button>`;
    scanCaptured=null;scanResult=null;
    document.getElementById("scanresult").innerHTML=`<div class="flex flex-col items-center py-8 text-slate-300"><span class="material-symbols-outlined text-4xl mb-2">center_focus_strong</span><span class="text-sm text-slate-400 text-center">Point at label then capture</span></div>`;
  }catch(err){
    errEl.textContent=err.name==="NotAllowedError"?"⚠ Camera permission denied. Check browser address bar.":err.name==="NotFoundError"?"⚠ No camera found. Use Upload.":`⚠ ${err.message}`;
    errEl.style.display="block";
  }
}
function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const vid=document.getElementById("camvid"),hint=document.getElementById("camhint");
  if(vid){vid.style.display="none";vid.srcObject=null;}if(hint)hint.style.display="flex";
  document.getElementById("cambuts").innerHTML=`
    <button onclick="startCam()" class="flex-1 flex items-center justify-center gap-1.5 bg-primary text-white font-bold py-2.5 rounded-xl text-sm"><span class="material-symbols-outlined text-base">videocam</span>Camera</button>
    <button onclick="document.getElementById('fileinput').click()" class="flex-1 flex items-center justify-center gap-1.5 bg-slate-100 text-slate-700 font-bold py-2.5 rounded-xl text-sm"><span class="material-symbols-outlined text-base">upload</span>Upload</button>`;
}
function captureFrame(){
  const vid=document.getElementById("camvid"),canvas=document.createElement("canvas");
  canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  canvas.getContext("2d").drawImage(vid,0,0);
  stopCam();showCaptured(canvas.toDataURL("image/jpeg",.92));
}
function showCaptured(dataUrl){
  scanCaptured=dataUrl;scanResult=null;
  const img=document.getElementById("camimg"),hint=document.getElementById("camhint");
  if(img){img.src=dataUrl;img.style.display="block";}if(hint)hint.style.display="none";
  document.getElementById("cambuts").innerHTML=`

    <button onclick="resetScan()" class="bg-slate-100 text-slate-600 font-bold py-2.5 px-4 rounded-xl text-sm">✕</button>`;
  document.getElementById("scanresult").innerHTML=`<div class="flex flex-col items-center py-8 text-slate-300"><span class="material-symbols-outlined text-4xl mb-2">auto_awesome</span><span class="text-sm text-slate-400 text-center">Tap <strong class="text-primary">Analyze</strong> to extract info</span></div>`;
}
function restoreScanImage(){
  const img=document.getElementById("camimg"),hint=document.getElementById("camhint");
  if(img){img.src=scanCaptured;img.style.display="block";}if(hint)hint.style.display="none";
  document.getElementById("cambuts").innerHTML=`
    <button onclick="analyzeLabel()" class="flex-1 bg-primary text-white font-bold py-2.5 rounded-xl text-sm">✦ Analyze</button>
    <button onclick="resetScan()" class="bg-slate-100 text-slate-600 font-bold py-2.5 px-4 rounded-xl text-sm">✕</button>`;

async function analyzeLabel(){

}

async function savePackaged(){
  if(!scanResult)return;
  const name=(document.getElementById("savename")?.value||"").trim()||scanResult.productName;
  const item={...scanResult,productName:name,id:Date.now(),addedAt:new Date().toISOString(),type:"packaged"};
  DB.ingredients.push(item);
  saveDB();toast(`✓ Saved: ${name}`);scanResult=null;scanCaptured=null;render();
  // Generate image in background and update
  generateFoodImage(name).then(url=>{
    if(!url)return;
    const i=DB.ingredients.find(x=>x.id===item.id);
    if(i){i.imageUrl=url;saveDB();if(TAB==="scan"||TAB==="dashboard")render();}
  });
}
function resetScan(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}scanCaptured=null;scanResult=null;render();}
function delIng(id){DB.ingredients=DB.ingredients.filter(i=>String(i.id)!==id);saveDB();render();}

function rawRowHTML(r,i){

function addRawRow(){rawRows.push({name:"",qty:"",unit:"g"});renderRaw();}
async function doLookup(){
  const valid=rawRows.filter(r=>r.name.trim()&&r.qty);
  if(!valid.length){toast("Add at least one ingredient with name and quantity","e");return;}
  document.getElementById("lookupbtn").disabled=true;
  document.getElementById("rawld").style.display="flex";
  try{
    const res=await lookupCalories(valid.map(r=>({name:r.name.trim(),quantity:parseFloat(r.qty),unit:r.unit})));
    const newItems=res.map(r=>({...r,id:Date.now()+Math.random(),addedAt:new Date().toISOString(),type:"raw"}));
    newItems.forEach(r=>DB.rawIngredients.push(r));
    saveDB();toast(`✓ Added ${res.length} ingredient${res.length>1?"s":""}`);
    rawRows=[{name:"",qty:"",unit:"g"}];renderRaw();
    // Generate images in background
    newItems.forEach(item=>{
      generateFoodImage(item.name).then(url=>{
        if(!url)return;
        const i=DB.rawIngredients.find(x=>x.id===item.id);
        if(i){i.imageUrl=url;saveDB();if(TAB==="raw"||TAB==="dashboard")render();}
      });
    });
  }catch(err){toast("Error: "+(err.message||"unknown"),"e");}
  const ld=document.getElementById("rawld");if(ld)ld.style.display="none";
  const lb=document.getElementById("lookupbtn");if(lb)lb.disabled=false;
}
function delRaw(id){DB.rawIngredients=DB.rawIngredients.filter(i=>String(i.id)!==String(id));saveDB();renderRaw();}

function saveRecipe(){

  const recipe={id:Date.now(),name:recName,description:recDesc,ingredients:valid,createdAt:new Date().toISOString()};

function fmtDateLabel(k){
  const today=todayKey();
  const yd=new Date();yd.setDate(yd.getDate()-1);const ydKey=yd.toISOString().split("T")[0];
  if(k===today)return"Today";if(k===ydKey)return"Yest.";
  const d=new Date(k+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function fmtDayFull(k){const d=new Date(k+"T00:00:00");return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function last30Days(){const d=[];for(let i=0;i<30;i++){const dt=new Date();dt.setDate(dt.getDate()-i);d.push(dt.toISOString().split("T")[0]);}return d;}
function dietTotals(entries){return entries.reduce((a,e)=>({cal:a.cal+e.cal,pro:a.pro+(e.pro||0),carb:a.carb+(e.carb||0),fat:a.fat+(e.fat||0),fib:a.fib+(e.fib||0)}),{cal:0,pro:0,carb:0,fat:0,fib:0});}

function renderDiet(){
  const days=last30Days();
  const entries=getDay(dietViewDate);
  const tot=dietTotals(entries);
  const nc=Math.max(0,tot.carb-tot.fib);
  const target=profileTarget();
  const pct=Math.min(100,Math.round(tot.cal/target*100));
  const isToday=dietViewDate===todayKey();
  const prof=activeProfile();
  const ringColor=pct>100?"#ef4444":pct>85?"#f97316":"#22c55e";

  document.getElementById("page").innerHTML=`
  <!-- Header row -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold">Daily Diet</h2>
      <p class="text-slate-400 text-sm mt-0.5">Track meals · 30-day history</p>
    </div>
    <button onclick="showProfileModal()" style="display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;padding:6px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;font-family:'Public Sans',sans-serif;flex-shrink:0">
      <span style="font-size:18px">${prof?.emoji||"😊"}</span>
      <span style="font-size:13px;font-weight:700;color:#1e293b;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${prof?.name||"Me"}</span>
      <span class="material-symbols-outlined" style="font-size:14px;color:#cbd5e1">expand_more</span>
    </button>
  </div>

  <!-- Day selector - calendar style -->
  <div style="margin-top:-4px">
    <div class="flex items-center justify-between mb-2">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Select Day</p>
      ${!isToday?`<button onclick="dietViewDate=todayKey();renderDiet()" class="text-xs font-bold text-primary">→ Today</button>`:""}
    </div>
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      ${days.map(d=>{
        const ents=getDay(d);const cal=ents.reduce((s,e)=>s+e.cal,0);
        const dt=new Date(d+"T00:00:00");
        const dayName=dt.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase();
        const dayNum=dt.getDate();
        const isOn=d===dietViewDate;
        return`<button onclick="dietViewDate='${d}';renderDiet()" class="day-pill-btn${isOn?" active":""}">
          <span class="text-[9px] font-bold uppercase">${dayName}</span>
          <span class="text-lg font-bold leading-none">${dayNum}</span>
          ${ents.length?`<div class="w-1.5 h-1.5 rounded-full mt-0.5 ${isOn?"bg-white":"bg-primary"}"></div>`:`<div class="w-1.5 h-1.5 mt-0.5"></div>`}
        </button>`;
      }).join("")}
    </div>
  </div>

  <!-- Day summary card -->
  <div class="bg-white rounded-3xl p-4 border border-slate-100 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="relative flex-shrink-0" style="width:90px;height:90px">
        <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
          <circle class="stroke-slate-100" cx="18" cy="18" fill="none" r="15.9155" stroke-width="3"/>
          <circle cx="18" cy="18" fill="none" r="15.9155"
            stroke="${ringColor}"
            stroke-dasharray="${pct},100"
            stroke-linecap="round" stroke-width="3"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-1">
          <span class="font-black leading-none" style="color:${ringColor};font-size:16px">${tot.cal}</span>
          <span class="text-slate-400 uppercase font-bold" style="font-size:7px;margin-top:1px">kcal</span>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <p class="font-bold text-slate-700 leading-tight mb-0.5" style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fmtDayFull(dietViewDate)}</p>
        <p class="text-slate-400 mb-2" style="font-size:11px">${target-tot.cal>0?`${target-tot.cal} left`:`${tot.cal-target} over`} · ${target} kcal target</p>
        <div class="macro-grid">
          ${[["Protein",tot.pro.toFixed(1),"g","#eff6ff","#2563eb"],["Carbs",tot.carb.toFixed(1),"g","#fffbeb","#d97706"],["Net Carbs",nc.toFixed(1),"g","#f5f3ff","#7c3aed"],["Fat",tot.fat.toFixed(1),"g","#fff1f2","#e11d48"]].map(([l,v,u,bg,col])=>`
          <div class="macro-row" style="background:${bg}">
            <div style="display:flex;align-items:baseline;gap:3px">
              <span class="macro-row-val" style="color:${col}">${v}${u}</span>
              <span class="macro-row-lbl" style="color:${col}">${l}</span>
            </div>
          </div>`).join("")}
        </div>
      </div>
    </div>
  </div>

  <!-- Meal slots: Breakfast / Lunch / Dinner / Snacks -->
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px">Scheduled Meals</p>
      ${isToday?`<button onclick="showAddToDietModal(null)" style="display:flex;align-items:center;gap:4px;background:#ec5b13;color:#fff;font-weight:700;padding:6px 12px;border-radius:12px;font-size:11px;border:none;cursor:pointer;font-family:'Public Sans',sans-serif">
        <span class="material-symbols-outlined" style="font-size:14px">add</span>Add Item
      </button>`:""}
    </div>

    ${[
      {slot:"breakfast", label:"Breakfast", icon:"wb_twilight",  iconColor:"#f59e0b", iconBg:"#fffbeb"},
      {slot:"lunch",     label:"Lunch",     icon:"light_mode",   iconColor:"#22c55e", iconBg:"#f0fdf4"},
      {slot:"dinner",    label:"Dinner",    icon:"dark_mode",    iconColor:"#6366f1", iconBg:"#eef2ff"},
      {slot:"snacks",    label:"Snacks",    icon:"cookie",       iconColor:"#f97316", iconBg:"#fff7ed"},
    ].map(({slot,label,icon,iconColor,iconBg})=>{
      const slotEntries = entries.filter(e=>( e.meal||"breakfast" ) === slot);
      const slotCal = slotEntries.reduce((s,e)=>s+e.cal,0);
      const isEmpty = slotEntries.length===0;
      return `
      <div style="background:#fff;border-radius:24px;border:${isEmpty&&isToday?"2px dashed #e2e8f0":"1px solid #f1f5f9"};box-shadow:${isEmpty?"none":"0 1px 4px rgba(0,0,0,.05)"};margin-bottom:10px;overflow:hidden">
        <!-- Slot header -->
        <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;${!isEmpty?"border-bottom:1px solid #f8fafc":""}">
          <div style="width:38px;height:38px;border-radius:12px;background:${iconBg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span class="material-symbols-outlined" style="font-size:18px;color:${iconColor}">${icon}</span>
          </div>
          <div style="flex:1;min-width:0">
            <p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px">${label}</p>
            ${isEmpty
              ? `<p style="font-size:13px;color:#cbd5e1;font-style:italic;margin-top:1px">${isToday?"Tap + to add a meal…":"Nothing logged"}</p>`
              : `<p style="font-size:13px;font-weight:700;color:#1e293b;margin-top:1px">${slotEntries.length} item${slotEntries.length!==1?"s":""} · <span style="color:${iconColor}">${slotCal} kcal</span></p>`
            }
          </div>
          ${isToday?`<button onclick="showAddToDietModal('${slot}')" style="width:32px;height:32px;border-radius:50%;background:#fff;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
            <span class="material-symbols-outlined" style="font-size:18px;color:#94a3b8">add</span>
          </button>`:""}
        </div>
        <!-- Slot items -->
        ${!isEmpty?`<div style="padding:0 16px">
          ${slotEntries.map((e)=>{
            const idx=entries.indexOf(e);
            return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc;overflow:hidden">
              <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0">
                ${e.imageUrl
                  ? `<img src="${e.imageUrl}" alt="${e.name}" style="width:100%;height:100%;object-fit:cover;display:block"/>`
                  : `<div style="width:100%;height:100%;${e.type==="recipe"?"background:#fff5f0":e.type==="pkg"?"background:#eff6ff":"background:#f0fdf4"};display:flex;align-items:center;justify-content:center"><span class="material-symbols-outlined" style="font-size:16px;${e.type==="recipe"?"color:#ec5b13":e.type==="pkg"?"color:#3b82f6":"color:#22c55e"}">${e.type==="recipe"?"restaurant":e.type==="pkg"?"inventory_2":"eco"}</span></div>`
                }
              </div>
              <div style="flex:1;min-width:0;overflow:hidden">
                <p style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b">${e.name}</p>
                <p style="font-size:11px;color:#94a3b8;margin-top:1px">${e.qty}× ${e.portionLabel} · ${(e.pro||0).toFixed(1)}g pro · ${Math.max(0,(e.carb||0)-(e.fib||0)).toFixed(1)}g net C</p>
              </div>
              <span style="font-size:13px;font-weight:700;color:#ec5b13;flex-shrink:0;white-space:nowrap">${e.cal} kcal</span>
              ${isToday?`<button onclick="removeDietEntry(${idx})" style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:#fff1f2;color:#f43f5e;border-radius:8px;font-size:11px;flex-shrink:0;border:none;cursor:pointer">✕</button>`:""}
            </div>`;
          }).join("")}
        </div>`:""}
      </div>`;
    }).join("")}
  </div>`;

  // Scroll today pill into view
  const todayPill=document.querySelector(".day-pill-btn.active");
  if(todayPill)setTimeout(()=>todayPill.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"}),100);
}

function removeDietEntry(idx){
  const e=getDay(dietViewDate);e.splice(idx,1);setDay(dietViewDate,e);renderDiet();
}

function selectDietSlot(s){
  window._dietSlot=s;
  // Update pill styles
  [["breakfast","#f59e0b","#fffbeb"],["lunch","#22c55e","#f0fdf4"],["dinner","#6366f1","#eef2ff"],["snacks","#f97316","#fff7ed"]].forEach(([id,col,bg])=>{
    const btn=document.getElementById("slot_btn_"+id);
    if(!btn)return;
    const on=id===s;
    btn.style.borderColor=on?col:"#e2e8f0";
    btn.style.background=on?bg:"#fff";
    btn.querySelectorAll("span:last-child").forEach(el=>el.style.color=on?col:"#64748b");
  });
}

function showAddToDietModal(slot){
  window._dietSlot = slot || "breakfast";
  window._addedItems = {}; // track {id: count} for badge display
  const lib=allIngs();

  const SLOTS=[["breakfast","Breakfast","wb_twilight","#f59e0b","#fffbeb"],["lunch","Lunch","light_mode","#22c55e","#f0fdf4"],["dinner","Dinner","dark_mode","#6366f1","#eef2ff"],["snacks","Snacks","cookie","#f97316","#fff7ed"]];

  const root=document.getElementById("modal-root");
  root.style.display="flex";
  root.className="modal-wrap";

  root.innerHTML=`<div class="modal-box" id="diet-modal-box" style="position:relative;padding-bottom:80px">
    <!-- Drag handle -->
    <div class="modal-handle w-9 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>

    <!-- Header with item count -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="font-size:17px;font-weight:700;color:#1e293b">Add to Today's Diet</h3>
      <div id="diet-added-badge" style="display:none;background:#ec5b13;color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">0 added</div>
    </div>

    <!-- Meal slot selector -->
    <div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px" class="no-scrollbar">
      ${SLOTS.map(([s,lbl,icon,col,bg])=>`
      <button id="slot_btn_${s}" onclick="selectDietSlot('${s}')"
        style="display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1.5px solid ${window._dietSlot===s?col:"#e2e8f0"};background:${window._dietSlot===s?bg:"#fff"};cursor:pointer;font-family:'Public Sans',sans-serif;white-space:nowrap;transition:all .15s;flex-shrink:0">
        <span class="material-symbols-outlined" style="font-size:14px;color:${col}">${icon}</span>
        <span style="font-size:12px;font-weight:700;color:${window._dietSlot===s?col:"#64748b"}">${lbl}</span>
      </button>`).join("")}
    </div>

    ${DB.recipes.length?`
    <p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">🍳 Recipes</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${DB.recipes.map(rec=>{const t=calcTotals(rec.ingredients);return`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:14px;border:1px solid #f1f5f9">
        ${rec.imageUrl?`<img src="${rec.imageUrl}" style="width:36px;height:36px;border-radius:10px;object-fit:cover;flex-shrink:0"/>`:
          `<div style="width:36px;height:36px;border-radius:10px;background:#ffedd5;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-outlined" style="font-size:16px;color:#ec5b13">restaurant</span></div>`}
        <div style="flex:1;min-width:0">
          <p style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b">${rec.name}</p>
          <p style="font-size:11px;color:#94a3b8">${t.cal} kcal · ${t.pro}g protein</p>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <input type="number" id="rqty_${rec.id}" min=".5" step=".5" value="1"
            style="width:44px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 4px;font-size:14px;font-weight:700;text-align:center;outline:none;font-family:'Public Sans',sans-serif"/>
          <button id="addbtn_r_${rec.id}" onclick="addRecipeToDietFromModal('${rec.id}')"
            style="background:#ec5b13;color:#fff;font-weight:700;padding:7px 12px;border-radius:10px;font-size:12px;border:none;cursor:pointer;font-family:'Public Sans',sans-serif;transition:all .2s;white-space:nowrap">Add</button>
        </div>
      </div>`;}).join("")}
    </div>`:""}

    ${lib.length?`
    <p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">🥦📦 Ingredients</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${lib.map(ing=>{
        const origItem=[...DB.ingredients,...DB.rawIngredients].find(x=>String(x.id)===ing.id);
        return`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:14px;border:1px solid #f1f5f9">
        ${origItem?.imageUrl?`<img src="${origItem.imageUrl}" style="width:36px;height:36px;border-radius:10px;object-fit:cover;flex-shrink:0"/>`:
          `<div style="width:36px;height:36px;border-radius:10px;background:${ing.type==="pkg"?"#eff6ff":"#f0fdf4"};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-outlined" style="font-size:16px;color:${ing.type==="pkg"?"#3b82f6":"#22c55e"}">${ing.type==="pkg"?"inventory_2":"eco"}</span></div>`}
        <div style="flex:1;min-width:0">
          <p style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b">${ing.label}</p>
          <p style="font-size:11px;color:#94a3b8">${ing.cal} kcal · ${(ing.pro||0).toFixed(1)}g protein</p>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <input type="number" id="iqty_${ing.id}" min=".1" step=".1" value="1"
            style="width:44px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 4px;font-size:14px;font-weight:700;text-align:center;outline:none;font-family:'Public Sans',sans-serif"/>
          <button id="addbtn_i_${ing.id}" onclick="addIngToDiet('${ing.id}')"
            style="background:#22c55e;color:#fff;font-weight:700;padding:7px 12px;border-radius:10px;font-size:12px;border:none;cursor:pointer;font-family:'Public Sans',sans-serif;transition:all .2s;white-space:nowrap">Add</button>
        </div>
      </div>`;}).join("")}
    </div>`:""}

    ${!DB.recipes.length&&!lib.length?`<p style="font-size:13px;color:#94a3b8;text-align:center;padding:24px 0">No ingredients or recipes yet.<br/>Add some in the other tabs first.</p>`:""}

    <!-- Floating Done button -->
    <div style="position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #f1f5f9;z-index:10">
      <button onclick="closeDietModal()" style="width:100%;background:#1e293b;color:#fff;font-weight:700;padding:14px;border-radius:14px;font-size:14px;border:none;cursor:pointer;font-family:'Public Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px">
        <span class="material-symbols-outlined" style="font-size:16px">check</span>
        Done
      </button>
    </div>
  </div>`;

  // ── Swipe down to dismiss ──────────────────────────────────────────────────
  const box = document.getElementById("diet-modal-box");
  let startY=0, isDragging=false;
  box.addEventListener("touchstart", e=>{
    if(e.target.closest("input,button,select")) return;
    startY=e.touches[0].clientY; isDragging=true;
  }, {passive:true});
  box.addEventListener("touchmove", e=>{
    if(!isDragging) return;
    const dy=e.touches[0].clientY - startY;
    if(dy>0) box.style.transform=`translateY(${dy}px)`;
  }, {passive:true});
  box.addEventListener("touchend", e=>{
    if(!isDragging) return; isDragging=false;
    const dy=e.changedTouches[0].clientY - startY;
    if(dy>80){ closeDietModal(); }
    else { box.style.transition="transform .25s ease"; box.style.transform=""; setTimeout(()=>box.style.transition="",300); }
  });
}

function closeDietModal(){
  closeModal();
  renderDiet(); // refresh diet view to show added items
}

function updateDietBadge(){
  const total=Object.values(window._addedItems||{}).reduce((s,v)=>s+v,0);
  const badge=document.getElementById("diet-added-badge");
  if(!badge)return;
  if(total>0){badge.style.display="block";badge.textContent=`${total} added`;}
  else badge.style.display="none";
}

function markBtnAdded(btnId){
  const btn=document.getElementById(btnId);
  if(!btn)return;
  btn.style.background="#16a34a";
  btn.textContent="✓ Added";
  setTimeout(()=>{
    btn.style.background = btnId.startsWith("addbtn_r_")?"#ec5b13":"#22c55e";
    btn.textContent="Add";
  }, 2000);
}

function addRecipeToDietFromModal(recId){
  const rec=DB.recipes.find(r=>String(r.id)===String(recId));if(!rec)return;
  const qty=parseFloat(document.getElementById(`rqty_${recId}`)?.value)||1;
  const t=calcTotals(rec.ingredients,qty);
  const e=getDay(todayKey());
  const slot=window._dietSlot||"breakfast";
  e.push({name:rec.name,qty,portionLabel:`serving${qty!==1?"s":""}`,cal:t.cal,pro:parseFloat(t.pro),carb:parseFloat(t.carb),fat:parseFloat(t.fat),fib:parseFloat(t.fib),type:"recipe",meal:slot,imageUrl:rec.imageUrl||null,addedAt:new Date().toISOString()});
  setDay(todayKey(),e);
  // UI feedback
  markBtnAdded("addbtn_r_"+recId);
  window._addedItems=window._addedItems||{};
  window._addedItems["r_"+recId]=(window._addedItems["r_"+recId]||0)+1;
  updateDietBadge();
}
function addIngToDiet(ingId){
  const lib=allIngs();const ing=lib.find(a=>a.id===String(ingId));if(!ing)return;
  const qty=parseFloat(document.getElementById(`iqty_${ingId}`)?.value)||1;
  const e=getDay(todayKey());
  const slot=window._dietSlot||"breakfast";
  const origItem=[...DB.ingredients,...DB.rawIngredients].find(x=>String(x.id)===ing.id);
  e.push({name:ing.label,qty,portionLabel:"portion",cal:Math.round(ing.cal*qty),pro:parseFloat(((ing.pro||0)*qty).toFixed(1)),carb:parseFloat(((ing.carb||0)*qty).toFixed(1)),fat:parseFloat(((ing.fat||0)*qty).toFixed(1)),fib:parseFloat(((ing.fib||0)*qty).toFixed(1)),type:ing.type,meal:slot,imageUrl:origItem?.imageUrl||null,addedAt:new Date().toISOString()});
  setDay(todayKey(),e);
  // UI feedback
  markBtnAdded("addbtn_i_"+ingId);
  window._addedItems=window._addedItems||{};
  window._addedItems["i_"+ingId]=(window._addedItems["i_"+ingId]||0)+1;
  updateDietBadge();
}
function addRecipeToDiet(recId){
  closeModal();showAddToDietModal("breakfast");
  setTimeout(()=>{const el=document.getElementById(`rqty_${recId}`);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},150);
}

// ════════════════════════════════════════════════════════
// PROFILE MANAGEMENT
// ════════════════════════════════════════════════════════
const PROFILE_EMOJIS=["😊","💪","🧘","🏃","👩","👨","👧","👦","🧑","👴","👵","🤸","🍎","🥗","⭐","🌟","🦁","🐯","🐻","🦊"];

function showProfileModal(){
  renderProfileModal();
}
function renderProfileModal(){
  const profiles=DB.profiles||[];const active=DB.activeProfile;
  showModal(`
    <div class="modal-handle w-9 h-1 bg-slate-200 rounded-full mx-auto mb-5"></div>
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-bold">Family Profiles</h3>
      <button onclick="showAddProfileForm()" class="flex items-center gap-1 bg-primary text-white font-bold py-1.5 px-3 rounded-xl text-xs">
        <span class="material-symbols-outlined text-sm">add</span>Add
      </button>
    </div>
    <div id="profile-list" class="space-y-2 mb-4">
      ${profiles.map(p=>{
        const days=Object.keys(p.dailyDiet||{}).length;
        const todayCal=((p.dailyDiet||{})[todayKey()]||[]).reduce((s,e)=>s+e.cal,0);
        const isActive=p.id===active;
        return`<div onclick="switchProfile('${p.id}')" class="flex items-center gap-3 p-3.5 rounded-2xl border cursor-pointer transition-all ${isActive?"border-primary bg-orange-50":"border-slate-200 bg-slate-50"}">
          <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0 ${isActive?"bg-primary":"bg-slate-200"}">${p.emoji||"😊"}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm">${p.name}</span>
              ${isActive?`<span class="text-[9px] bg-primary text-white px-2 py-0.5 rounded-full font-bold">Active</span>`:""}
            </div>
            <p class="text-xs text-slate-400 mt-0.5">${p.calorieTarget||2000} kcal target · ${days} days
              ${todayCal>0?` · <strong class="text-primary">${todayCal} kcal today</strong>`:""}</p>
          </div>
          <div class="flex gap-1.5 flex-shrink-0">
            <button onclick="event.stopPropagation();showEditProfile('${p.id}')" class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600">Edit</button>
            ${profiles.length>1?`<button onclick="event.stopPropagation();deleteProfile('${p.id}')" class="px-2.5 py-1.5 bg-red-50 border border-red-100 rounded-lg text-xs font-bold text-red-400">✕</button>`:""}
          </div>
        </div>`;
      }).join("")}
    </div>
    <div id="profile-form" style="display:none"></div>
    <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-sm">Done</button>
  `);
}
function showAddProfileForm(editId){
  const editing=editId?DB.profiles.find(p=>p.id===editId):null;
  const formEl=document.getElementById("profile-form");
  const listEl=document.getElementById("profile-list");
  if(listEl)listEl.style.display="none";
  const doneBtn=document.querySelector("#modal-root .modal-box button:last-child");
  if(doneBtn)doneBtn.style.display="none";
  if(formEl){
    formEl.style.display="block";
    window._selectedEmoji=editing?editing.emoji:PROFILE_EMOJIS[0];
    formEl.innerHTML=`
      <p class="text-base font-bold mb-4">${editing?"Edit Profile":"New Profile"}</p>
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Name</label>
      <input id="pname" placeholder="e.g. Sarah, Dad…" value="${editing?editing.name:""}"
        class="w-full mt-1 mb-3 bg-slate-50 border-[1.5px] border-slate-200 rounded-xl p-3 font-bold text-sm outline-none focus:border-primary" style="font-family:'Public Sans',sans-serif"/>
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Daily Calorie Target</label>
      <input id="ptarget" type="number" placeholder="e.g. 1800" value="${editing?editing.calorieTarget:""}"
        class="w-full mt-1 mb-3 bg-slate-50 border-[1.5px] border-slate-200 rounded-xl p-3 font-bold text-sm outline-none focus:border-primary" style="font-family:'Public Sans',sans-serif"/>
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">Choose Emoji</label>
      <div class="flex flex-wrap gap-2 mb-4">
        ${PROFILE_EMOJIS.map(e=>`<button type="button" onclick="selectEmoji('${e}')" id="emoji_${e}"
          class="w-10 h-10 rounded-xl border-[1.5px] text-xl flex items-center justify-center transition-all ${(editing?editing.emoji:PROFILE_EMOJIS[0])===e?"border-primary bg-orange-50":"border-slate-200 bg-slate-50"}">${e}</button>`).join("")}
      </div>
      <div class="flex gap-2">
        <button onclick="saveProfile(${editId?`'${editId}'`:null})" class="flex-1 bg-primary text-white font-bold py-3 rounded-xl text-sm">${editing?"Save Changes":"Create Profile"}</button>
        <button onclick="renderProfileModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-sm">Cancel</button>
      </div>`;
  }
}
function showEditProfile(id){showAddProfileForm(id);}
function selectEmoji(e){
  window._selectedEmoji=e;
  document.querySelectorAll("[id^='emoji_']").forEach(el=>{
    const on=el.id===`emoji_${e}`;
    el.className=el.className.replace(/border-primary|border-slate-200|bg-orange-50|bg-slate-50/g,"");
    el.className+=on?" border-primary bg-orange-50":" border-slate-200 bg-slate-50";
  });
}
function saveProfile(editId){
  const name=(document.getElementById("pname")?.value||"").trim();
  const target=parseInt(document.getElementById("ptarget")?.value)||2000;
  const emoji=window._selectedEmoji||PROFILE_EMOJIS[0];
  if(!name){toast("Enter a name for this profile","e");return;}
  if(!DB.profiles)DB.profiles=[];
  if(editId){const p=DB.profiles.find(p=>p.id===editId);if(p){p.name=name;p.calorieTarget=target;p.emoji=emoji;}}
  else{const id="p_"+Date.now();DB.profiles.push({id,name,emoji,calorieTarget:target,dailyDiet:{},createdAt:new Date().toISOString()});if(DB.profiles.length===1)DB.activeProfile=id;}
  saveDB();toast(editId?"✓ Profile updated":"✓ Profile created");renderProfileModal();
}
function switchProfile(id){
  DB.activeProfile=id;dietViewDate=todayKey();saveDB();
  closeModal();toast(`✓ Switched to ${DB.profiles.find(p=>p.id===id)?.name||"profile"}`);render();
}
function deleteProfile(id){
  if(DB.profiles.length<=1){toast("Can't delete the only profile","e");return;}
  const p=DB.profiles.find(x=>x.id===id);
  if(!confirm(`Delete ${p?.name||"this profile"} and all their diet history?`))return;
  DB.profiles=DB.profiles.filter(x=>x.id!==id);
  if(DB.activeProfile===id)DB.activeProfile=DB.profiles[0]?.id;
  saveDB();toast("Profile deleted");renderProfileModal();
}

function bindAfterRender(){
  if(recMode==="create"){
    document.querySelectorAll("#recings select").forEach((sel,i)=>{if(recIng[i]?.ingredientId)sel.value=recIng[i].ingredientId;});
  }
}

// ════════════════════════════════════════════════════════
// iOS INSTALL BANNER
// ════════════════════════════════════════════════════════
function showInstallBanner(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari=/safari/i.test(navigator.userAgent)&&!/chrome/i.test(navigator.userAgent);
  if(!isIOS||!isSafari||navigator.standalone||localStorage.getItem("install_dismissed"))return;
  const banner=document.createElement("div");
  banner.style.cssText="position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid #e2e8f0;padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));z-index:500;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.08)";
  banner.innerHTML=`<img src="/icon-60.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0"/>
    <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;font-family:'Public Sans',sans-serif">Add to Home Screen</div>
    <div style="font-size:12px;color:#64748b;margin-top:2px;font-family:'Public Sans',sans-serif">Tap Share → Add to Home Screen</div></div>
    <button onclick="this.closest('div').remove();localStorage.setItem('install_dismissed','1')" style="border:none;background:transparent;color:#94a3b8;font-size:22px;cursor:pointer;flex-shrink:0">×</button>`;
  document.body.appendChild(banner);
}

// ════════════════════════════════════════════════════════
// MIDNIGHT RESET
// ════════════════════════════════════════════════════════
function checkMidnightReset(){
  migrateToProfiles();
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const cutKey=cutoff.toISOString().split("T")[0];
  (DB.profiles||[]).forEach(p=>{
    if(!p.dailyDiet)p.dailyDiet={};
    Object.keys(p.dailyDiet).forEach(k=>{if(k<cutKey)delete p.dailyDiet[k];});
  });
  saveDB();
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
(async()=>{
  document.getElementById("page").innerHTML=`
    <div class="flex flex-col items-center justify-center min-h-[60vh] gap-4">
      <span class="material-symbols-outlined text-primary text-5xl">local_fire_department</span>
      <div class="flex items-center gap-2 text-slate-400 text-sm"><div class="spin"></div>Loading CaloriTrack…</div>
    </div>`;
  await loadDB();
  checkMidnightReset();
  render();
  setTimeout(showInstallBanner,3000);
  setInterval(async()=>{
    try{const r=await fetch("/api/data");if(!r.ok)return;const fresh=await r.json();if(JSON.stringify(fresh)!==JSON.stringify(DB)){DB={...DB,...fresh};render();}}catch{}
  },30000);
})();
</script>
